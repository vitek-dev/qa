name: Build and push Docker image

on:
  push:
    branches: [ "php/*" ]

jobs:
  build-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Derive image tag from branch name
        id: meta
        run: echo "tag=${GITHUB_REF_NAME#php/}" >> "$GITHUB_OUTPUT"

      - name: Substitute PHP version into Dockerfile
        run: sed -i "s/%%PHP_VERSION%%/${{ steps.meta.outputs.tag }}/" Dockerfile

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository }}:v${{ steps.meta.outputs.tag }}
          push: true
